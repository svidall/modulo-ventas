spring.application.name=modulo-ventas

# Database configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/par2.0
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA properties
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ActiveMQ configuration
spring.activemq.broker-url=vm://localhost?broker.persistent=false
# If using a external broker, configure here:
# spring.activemq.broker-url=tcp://localhost:61616

# Integration configurations
app.integration.stock.url=http://localhost:8000
app.integration.caja.mode=KAFKA
app.integration.caja.url=http://localhost:8081
app.integration.caja.queue-name=caja.solicitudes

# Kafka configuration
spring.kafka.bootstrap-servers=0.tcp.sa.ngrok.io:29401
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=modulo-ventas-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Swagger/Springdoc configurations
springdoc.packages-to-scan=com.ventas.modulo.controller

spring.jackson.property-naming-strategy=SNAKE_CASE

