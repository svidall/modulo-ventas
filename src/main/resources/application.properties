spring.application.name=modulo-ventas

# Database configuration (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:par2.0}}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA properties
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ActiveMQ configuration
spring.activemq.broker-url=vm://localhost?broker.persistent=false
# If using a external broker, configure here:
# spring.activemq.broker-url=tcp://localhost:61616

# Integration configurations
app.integration.stock.url=${STOCK_URL:http://localhost:3002}
app.integration.caja.mode=KAFKA
app.integration.caja.url=${CAJA_URL:http://localhost:8081}
app.integration.caja.queue-name=caja.solicitudes

# Kafka configuration
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=modulo-ventas-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Swagger/Springdoc configurations
springdoc.packages-to-scan=com.ventas.modulo.controller

spring.jackson.property-naming-strategy=SNAKE_CASE

# Resiliency settings if Kafka is down at startup
spring.kafka.listener.missing-topics-fatal=false
spring.kafka.admin.fail-fast=false
spring.kafka.properties.max.block.ms=3000

