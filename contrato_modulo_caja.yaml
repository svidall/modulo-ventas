{"openapi":"3.1.0","info":{"title":"Módulo Caja","description":"\nAPI REST del módulo Caja del sistema distribuido.\n\n## Flujo general\n\n- Ventas y Compras envían solicitudes a una cola de mensajes (**ActiveMQ o Kafka**, a elección de cada módulo)\n- Un listener lee la cola de entrada e inserta en `SOLICITUD_COBRO` o `SOLICITUD_PAGO`\n- El front consulta Caja para listar solicitudes pendientes\n- El operador especifica formas de pago/cobro y confirma\n- Caja consulta **Stock de forma síncrona por HTTP** (solo para cobros)\n- Caja notifica a Ventas/Compras publicando en **ambas colas (ActiveMQ y Kafka)** al finalizar\n\n## Colas disponibles para integración\n\n### Cola de entrada — solicitudes hacia Caja\n| Broker | Puerto | Host público | Destino/Topic | Selector/Key |\n|--------|--------|-------------|---------------|--------------|\n| ActiveMQ (STOMP) | 11234 | 0.tcp.sa.ngrok.io | /queue/caja.solicitudes | header tipo=VENTA o tipo=COMPRA |\n| Kafka | 29401 | 0.tcp.sa.ngrok.io | caja.solicitudes | key=VENTA o key=COMPRA |\n\n### Cola de salida — respuestas desde Caja\n| Broker | Puerto | Host público | Destino/Topic | Filtro |\n|--------|--------|-------------|---------------|--------|\n| ActiveMQ (STOMP) | 11234 | 0.tcp.sa.ngrok.io | /queue/caja.respuesta | selector tipo=COBRO o tipo=PAGO |\n| Kafka | 29401 | 0.tcp.sa.ngrok.io | caja.respuesta | key=COBRO o key=PAGO |\n\n## Contrato de mensajes\n\n### Ventas → Caja (ActiveMQ header tipo=VENTA / Kafka key=VENTA)\n```json\n{\n  \"tipo\": \"SOLICITUD_COBRO\",\n  \"id_venta\": \"VTA-001-000001\",\n  \"id_reserva\": 26,\n  \"documento_ref\": \"VTA-001-000001\",\n  \"items\": [{\"producto_id\": 1, \"cantidad\": 1, \"precio_venta\": 150000}],\n  \"cliente\": \"Juan Perez\",\n  \"concepto\": \"Venta factura 001\",\n  \"monto\": 150000.00\n}\n```\n\n### Compras → Caja (ActiveMQ header tipo=COMPRA / Kafka key=COMPRA)\n```json\n{\n  \"tipo\": \"SOLICITUD_PAGO\",\n  \"id_compra\": \"CMP-001-000001\",\n  \"proveedor\": \"Proveedor SA\",\n  \"concepto\": \"Compra orden 001\",\n  \"monto\": 500000.00\n}\n```\n\n### Caja → Ventas (ActiveMQ selector tipo=COBRO / Kafka key=COBRO)\n```json\n{\n  \"tipo\": \"COBRO_CONFIRMADO\",\n  \"id_solicitud_cobro\": 91,\n  \"id_venta\": \"VTA-001-000001\"\n}\n```\n\n### Caja → Compras (ActiveMQ selector tipo=PAGO / Kafka key=PAGO)\n```json\n{\n  \"tipo\": \"PAGO_CONFIRMADO\",\n  \"id_solicitud_pago\": 10,\n  \"id_compra\": \"CMP-001-000001\"\n}\n```\n\n## Integración con Stock\nCaja llama a `POST /ventas/confirmar` en Stock de forma **síncrona por HTTP**.\nStock URL: `http://158.220.111.78:8181`\nStock devuelve un comprobante interno (formato `STK-DDD-DDDDDD-D`) que Caja guarda en Oracle para trazabilidad.\n    ","contact":{"name":"Módulo Caja"},"license":{"name":"MIT"},"version":"1.0.0"},"servers":[{"url":"https://fossil-jingle-footboard.ngrok-free.dev","description":"Público ngrok"},{"url":"http://192.168.137.180:8000","description":"Red local"},{"url":"http://localhost:8000","description":"Local"}],"paths":{"/api/v1/formas-cobro":{"get":{"tags":["Catálogos"],"summary":"Listar Formas Cobro","description":"Catálogo de formas de cobro activas.","operationId":"listar_formas_cobro_api_v1_formas_cobro_get","responses":{"200":{"description":"Successful Response","content":{"application/json":{"schema":{"items":{"$ref":"#/components/schemas/FormaCobroOut"},"type":"array","title":"Response Listar Formas Cobro Api V1 Formas Cobro Get"}}}}}}},"/api/v1/formas-pago":{"get":{"tags":["Catálogos"],"summary":"Listar Formas Pago","description":"Catálogo de formas de pago activas.","operationId":"listar_formas_pago_api_v1_formas_pago_get","responses":{"200":{"description":"Successful Response","content":{"application/json":{"schema":{"items":{"$ref":"#/components/schemas/FormaPagoOut"},"type":"array","title":"Response Listar Formas Pago Api V1 Formas Pago Get"}}}}}}},"/api/v1/cobros":{"get":{"tags":["Cobros"],"summary":"Listar Cobros","operationId":"listar_cobros_api_v1