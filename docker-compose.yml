version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sales_db
    environment:
      POSTGRES_DB: par2.0
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "12345"
    ports:
      - "5432:5432"
    volumes:
      - ./db.sql:/docker-entrypoint-initdb.d/1-db.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d par2.0"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: sales_app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/par2.0
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=12345
      - SPRING_JPA_HIBERNATE_DDL_AUTO=none
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
